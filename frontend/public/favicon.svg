<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Sunrise sunset icon">
  <defs>
    <clipPath id="clipCircle">
      <circle cx="256" cy="256" r="236"/>
    </clipPath>

    <linearGradient id="skyGradient" x1="0" y1="40" x2="0" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#243a86"/>
      <stop offset="0.58" stop-color="#ee6d2d"/>
      <stop offset="1" stop-color="#f6a63a"/>
    </linearGradient>

    <linearGradient id="seaGradient" x1="0" y1="250" x2="0" y2="492" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#082f82"/>
      <stop offset="1" stop-color="#031946"/>
    </linearGradient>

    <radialGradient id="sunGradient" cx="35%" cy="28%" r="70%">
      <stop offset="0" stop-color="#fff39a"/>
      <stop offset="0.55" stop-color="#ffd23f"/>
      <stop offset="1" stop-color="#f78d20"/>
    </radialGradient>

    <linearGradient id="rimGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172b74"/>
      <stop offset="1" stop-color="#020b28"/>
    </linearGradient>
  </defs>

  <!-- Outer circular rim -->
  <circle cx="256" cy="256" r="252" fill="url(#rimGradient)"/>

  <!-- Everything below is clipped to a perfect circle -->
  <g clip-path="url(#clipCircle)">
    <rect x="20" y="20" width="472" height="472" fill="url(#skyGradient)"/>

    <!-- Soft sun glow -->
    <circle cx="256" cy="245" r="118" fill="#ffd34a" opacity="0.22"/>
    <circle cx="256" cy="245" r="88" fill="url(#sunGradient)"/>

    <!-- Sun rays behind horizon -->
    <g stroke="#ffc447" stroke-width="11" stroke-linecap="round" opacity="0.95">
      <line x1="256" y1="82" x2="256" y2="136"/>
      <line x1="170" y1="109" x2="201" y2="154"/>
      <line x1="342" y1="109" x2="311" y2="154"/>
      <line x1="103" y1="185" x2="154" y2="207"/>
      <line x1="409" y1="185" x2="358" y2="207"/>
    </g>

    <!-- Sea / foreground covers lower half of sun -->
    <rect x="20" y="256" width="472" height="236" fill="url(#seaGradient)"/>

    <!-- Horizon line -->
    <line x1="62" y1="256" x2="450" y2="256" stroke="#ffbd45" stroke-width="8" stroke-linecap="round"/>

    <!-- Low distant shore silhouettes -->
    <path d="M20 258 C58 238 105 238 144 258 Z" fill="#041a55" opacity="0.95"/>
    <path d="M368 258 C407 238 454 238 492 258 Z" fill="#041a55" opacity="0.95"/>

    <!-- Reflection ripples -->
    <g stroke-linecap="round" fill="none">
      <line x1="155" y1="298" x2="357" y2="298" stroke="#ffc04b" stroke-width="11"/>
      <line x1="132" y1="329" x2="380" y2="329" stroke="#f99b35" stroke-width="9"/>
      <line x1="166" y1="361" x2="346" y2="361" stroke="#ffc04b" stroke-width="8"/>
      <line x1="188" y1="393" x2="324" y2="393" stroke="#f99b35" stroke-width="7"/>
      <line x1="211" y1="424" x2="301" y2="424" stroke="#ffc04b" stroke-width="6"/>
      <line x1="236" y1="452" x2="276" y2="452" stroke="#f99b35" stroke-width="5"/>
    </g>
  </g>

  <!-- Inner highlight and crisp circular boundary -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="8"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#06123b" stroke-width="8"/>
</svg>
